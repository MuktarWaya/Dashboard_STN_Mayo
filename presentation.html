<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Briefing สด — สธน.มายอ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --page:#EEF3F1;--surface:#FFFFFF;--ink:#10241E;--ink-2:#355047;--muted:#6B7F78;
  --line:#D9E4E0;--line-2:#C2D2CC;--brand:#087F5B;--brand-2:#0CA678;--brand-soft:#DFF5EC;
  --navy:#112C34;--navy-2:#1C4149;--sky:#1971C2;--sky-soft:#E7F5FF;
  --ok:#087F5B;--ok-soft:#E6FCF5;--warn:#E67700;--warn-soft:#FFF4E6;
  --bad:#C92A2A;--bad-soft:#FFF5F5;--shadow:0 18px 50px rgba(17,44,52,.12);
  --font:'IBM Plex Sans Thai','Noto Sans Thai','Sarabun',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{font-family:var(--font);color:var(--ink);background:var(--page);overflow:hidden;-webkit-font-smoothing:antialiased}
button{font:inherit}
.deck{position:relative;width:100vw;height:100vh;overflow:hidden;background:
  radial-gradient(circle at 90% 10%,rgba(12,166,120,.12),transparent 30%),
  linear-gradient(135deg,#F4F8F6 0%,#E8F0ED 100%)}
.progress{position:fixed;z-index:50;left:0;top:0;height:4px;background:var(--brand-2);transition:width .25s ease}
.live-badge{position:fixed;z-index:40;right:18px;top:16px;display:flex;align-items:center;gap:8px;padding:7px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.92);box-shadow:0 4px 18px rgba(17,44,52,.08);font-size:12px;font-weight:600;color:var(--ink-2);backdrop-filter:blur(10px)}
.live-badge i{width:8px;height:8px;border-radius:50%;background:var(--warn)}
.live-badge.live{color:var(--ok);border-color:#A9E3D0}.live-badge.live i{background:var(--ok);box-shadow:0 0 0 4px rgba(8,127,91,.1)}
.live-badge.cached{color:#9C5B00;border-color:#FFD8A8}.live-badge.cached i{background:var(--warn)}
.live-badge.error{color:var(--bad);border-color:#FFC9C9}.live-badge.error i{background:var(--bad)}
.slide{position:absolute;inset:0;display:none;padding:clamp(28px,5vh,58px) clamp(28px,5vw,80px) clamp(82px,10vh,104px);overflow:auto}
.slide.active{display:flex;animation:enter .35s cubic-bezier(.2,.8,.2,1)}
@keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sheet{width:min(1240px,100%);min-height:min(690px,calc(100vh - 138px));margin:auto;background:rgba(255,255,255,.94);border:1px solid rgba(194,210,204,.9);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;position:relative}
.sheet::after{content:"";position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(17,44,52,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(17,44,52,.025) 1px,transparent 1px);background-size:32px 32px;mask-image:linear-gradient(to bottom,#000,transparent 45%)}
.head{position:relative;z-index:1;padding:clamp(20px,3.2vh,34px) clamp(22px,3.5vw,46px) 18px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:22px}
.head-main{min-width:0}.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);font-weight:600;margin-bottom:8px}
h1,h2{letter-spacing:-.025em;line-height:1.15}h1{font-size:clamp(32px,5vw,64px)}h2{font-size:clamp(25px,3.5vw,43px)}
.subtitle{font-size:clamp(13px,1.55vw,17px);color:var(--muted);line-height:1.55;margin-top:8px;max-width:900px}
.status-block{flex:0 0 auto;text-align:right}.score{font-family:var(--mono);font-size:clamp(28px,4vw,50px);font-weight:600;line-height:1;color:var(--brand)}
.status-pill{display:inline-flex;align-items:center;gap:6px;margin-top:8px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:600;background:var(--ok-soft);color:var(--ok)}
.status-pill.watch{background:var(--warn-soft);color:#A85700}.status-pill.urgent{background:var(--bad-soft);color:var(--bad)}
.body{position:relative;z-index:1;flex:1;padding:clamp(18px,3vh,32px) clamp(22px,3.5vw,46px);display:flex;flex-direction:column;gap:18px}
.cover .sheet{background:linear-gradient(130deg,var(--navy) 0%,var(--navy-2) 62%,#176B5A 100%);border-color:rgba(255,255,255,.12);color:#fff;justify-content:center}
.cover .sheet::before{content:"";position:absolute;width:500px;height:500px;border:1px solid rgba(255,255,255,.08);border-radius:50%;right:-120px;top:-230px;box-shadow:0 0 0 90px rgba(255,255,255,.025),0 0 0 180px rgba(255,255,255,.02)}
.cover-inner{position:relative;z-index:1;padding:clamp(34px,7vw,92px);max-width:980px}.cover .eyebrow{color:#8CEBC7}.cover h1{max-width:900px}.cover h1 em{font-style:normal;color:#8CEBC7}.cover .subtitle{color:#C8DAD5;font-size:clamp(15px,2vw,21px);max-width:780px}.cover-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}.cover-chip{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:999px;padding:7px 12px;color:#E7F2EF;font-size:12px}
.grid{display:grid;gap:14px}.grid.c4{grid-template-columns:repeat(4,1fr)}.grid.c3{grid-template-columns:repeat(3,1fr)}.grid.c2{grid-template-columns:repeat(2,1fr)}
.kpi{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:17px;min-height:116px}.kpi b{display:block;font-family:var(--mono);font-size:clamp(24px,3.4vw,40px);line-height:1.05;color:var(--navy)}.kpi span{display:block;color:var(--muted);font-size:12px;line-height:1.45;margin-top:8px}.kpi.bad b{color:var(--bad)}.kpi.good b{color:var(--brand)}
.brief{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;flex:1}.panel{border:1px solid var(--line);border-radius:16px;background:#fff;padding:18px}.panel h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}.panel h3 .tag{font-family:var(--mono);font-size:10px;color:var(--brand);background:var(--brand-soft);padding:3px 7px;border-radius:999px}
.lead-insight{font-size:clamp(19px,2.4vw,29px);font-weight:600;line-height:1.45;letter-spacing:-.015em}.lead-insight strong{color:var(--brand)}
.signal-list{display:flex;flex-direction:column;gap:9px;margin-top:14px}.signal{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:11px;background:#F6F9F8;color:var(--ink-2);font-size:13px;line-height:1.5}.signal i{font-style:normal}.signal.risk{background:var(--bad-soft);color:#8F2525}.signal.action{background:var(--sky-soft);color:#18548A}
.program-list{display:flex;flex-direction:column;gap:8px}.program-row{display:grid;grid-template-columns:minmax(190px,1.4fr) minmax(160px,2fr) 74px 110px;gap:12px;align-items:center;padding:9px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}.program-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:9px;background:#EDF2F0;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;border-radius:inherit;background:var(--brand)}.bar span.watch{background:var(--warn)}.bar span.urgent{background:var(--bad)}.pct{font-family:var(--mono);font-size:13px;font-weight:600;text-align:right}.row-status{font-size:11px;font-weight:600;text-align:center;padding:4px 7px;border-radius:999px;background:var(--ok-soft);color:var(--ok)}.row-status.watch{background:var(--warn-soft);color:#A85700}.row-status.urgent{background:var(--bad-soft);color:var(--bad)}
.program-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;flex:1;min-height:0}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{border:1px solid var(--line);border-radius:13px;background:#fff;padding:13px}.metric b{display:block;font-family:var(--mono);font-size:clamp(18px,2.2vw,27px);line-height:1.1}.metric span{display:block;color:var(--muted);font-size:11px;line-height:1.4;margin-top:6px}.facility-rank{display:flex;flex-direction:column;gap:7px}.facility-line{display:grid;grid-template-columns:28px minmax(130px,1fr) 56px;gap:8px;align-items:center;padding:7px 9px;border-radius:10px;background:#F6F9F8;font-size:12px}.facility-line.low{background:var(--bad-soft)}.facility-line .rank{font-family:var(--mono);color:var(--muted)}.facility-line b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.facility-line .value{font-family:var(--mono);font-weight:600;text-align:right}
.insight-box{height:100%;border-radius:16px;background:linear-gradient(145deg,var(--navy),#1B4C4B);color:#fff;padding:18px;display:flex;flex-direction:column;gap:13px}.insight-box .ai-label{font-family:var(--mono);font-size:10px;letter-spacing:.07em;color:#8CEBC7}.insight-box h3{font-size:clamp(17px,2vw,23px);line-height:1.4}.insight-box .signal{background:rgba(255,255,255,.08);color:#E6F1EE;border:1px solid rgba(255,255,255,.08)}.insight-box .signal.risk{background:rgba(255,187,187,.1);color:#FFD8D8}.insight-box .signal.action{background:rgba(140,235,199,.1);color:#C9F7E6}.insight-note{margin-top:auto;font-size:10px;color:#AFC8C1;line-height:1.5}
.support-table{width:100%;border-collapse:separate;border-spacing:0 7px}.support-table th{text-align:left;color:var(--muted);font-size:11px;font-weight:600;padding:0 10px}.support-table td{background:#F7FAF9;padding:10px;font-size:12px}.support-table td:first-child{border-radius:10px 0 0 10px}.support-table td:last-child{border-radius:0 10px 10px 0}.support-table .mono{font-family:var(--mono);font-weight:600}.support-table .danger{color:var(--bad)}
.decision-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1}.decision{border:1px solid var(--line);border-radius:18px;padding:20px;background:#fff;display:flex;flex-direction:column}.decision .no{font-family:var(--mono);font-size:11px;color:var(--brand);margin-bottom:12px}.decision h3{font-size:clamp(17px,2vw,23px);line-height:1.35}.decision p{font-size:13px;color:var(--muted);line-height:1.6;margin-top:10px}.decision .owner{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-2)}
.footer-line{display:flex;justify-content:space-between;gap:15px;color:var(--muted);font-size:10px;margin-top:auto;padding-top:4px}.footer-line span:last-child{text-align:right}
.nav{position:fixed;z-index:45;left:50%;bottom:18px;transform:translateX(-50%);display:flex;align-items:center;gap:7px;padding:6px 9px;border:1px solid var(--line-2);border-radius:999px;background:rgba(255,255,255,.95);box-shadow:0 8px 28px rgba(17,44,52,.14);backdrop-filter:blur(12px)}
.nav button{width:36px;height:36px;border:1px solid var(--line);border-radius:50%;background:#fff;color:var(--ink);cursor:pointer;font-weight:600}.nav button:hover{background:var(--brand-soft);border-color:#A9E3D0}.nav .counter{font-family:var(--mono);font-size:12px;color:var(--ink-2);min-width:56px;text-align:center}.nav .sep{width:1px;height:22px;background:var(--line)}
.empty{display:grid;place-items:center;min-height:240px;text-align:center;color:var(--muted)}
@media(max-height:760px) and (min-width:901px){
  .slide{padding:22px 42px 66px}
  .sheet{min-height:calc(100vh - 92px);max-height:calc(100vh - 92px);border-radius:18px}
  .head{padding:13px 28px 10px;gap:14px}.head .eyebrow{margin-bottom:4px}.head h2{font-size:29px}.subtitle{margin-top:3px;font-size:12px;line-height:1.35}
  .body{padding:11px 28px;gap:9px}.grid{gap:9px}.kpi{padding:11px;min-height:82px}.kpi b{font-size:27px}.kpi span{margin-top:4px}
  .brief,.program-layout{gap:9px}.panel{padding:11px}.panel h3{margin-bottom:7px}.lead-insight{font-size:20px;line-height:1.35}
  .signal-list{gap:5px;margin-top:7px}.signal{padding:6px 9px;font-size:11px;line-height:1.35}
  .metric-grid{gap:6px}.metric{padding:8px 10px}.metric b{font-size:19px}.metric span{margin-top:3px;font-size:10px}
  .facility-rank{gap:4px}.facility-line{padding:4px 8px;font-size:11px}.insight-box{padding:12px;gap:7px}.insight-box h3{font-size:17px;line-height:1.3}.insight-note{font-size:9px}
  .program-list{gap:5px}.program-row{padding:6px 10px}.decision{padding:14px}.decision p{margin-top:6px;line-height:1.4}.decision .owner{padding-top:9px}
  .support-table{border-spacing:0 4px}.support-table td{padding:7px 9px}.footer-line{font-size:8px}
}
@media(max-width:900px){.sheet{min-height:calc(100vh - 125px)}.grid.c4{grid-template-columns:repeat(2,1fr)}.brief,.program-layout{grid-template-columns:1fr}.insight-box{min-height:260px}.decision-grid{grid-template-columns:1fr}.slide{padding:52px 16px 76px}.head{padding-top:24px}.status-block{display:none}.program-row{grid-template-columns:minmax(130px,1fr) 1.5fr 60px}.row-status{display:none}}
@media(max-width:540px){.live-badge{top:9px;right:9px;font-size:10px}.sheet{border-radius:16px}.grid.c4,.grid.c3,.grid.c2,.metric-grid{grid-template-columns:1fr}.program-row{grid-template-columns:1fr 58px}.program-row .bar{display:none}.body{padding:16px}.head{padding:20px 16px 14px}.cover-inner{padding:34px 22px}.footer-line{flex-direction:column}.support-table th:nth-child(3),.support-table td:nth-child(3){display:none}}
@media(prefers-reduced-motion:reduce){.slide.active{animation:none}}
</style>
</head>
<body>
<div class="deck" id="deck">
  <div class="progress" id="progress"></div>
  <div class="live-badge" id="badge" role="status" aria-live="polite"><i></i><span>กำลังอ่านข้อมูลล่าสุด…</span></div>
  <div id="slides"><section class="slide active"><div class="sheet"><div class="empty"><div><h2>กำลังจัดทำ Executive Briefing</h2><p class="subtitle">อ่านข้อมูล 7 งานและวิเคราะห์ประเด็นสำหรับการประชุม…</p></div></div></div></section></div>
</div>
<div class="nav" aria-label="ควบคุมสไลด์">
  <button type="button" id="prev" aria-label="สไลด์ก่อนหน้า">←</button>
  <span class="counter"><span id="current">1</span> / <span id="total">1</span></span>
  <button type="button" id="next" aria-label="สไลด์ถัดไป">→</button>
  <span class="sep"></span>
  <button type="button" id="refresh" aria-label="ดึงข้อมูลใหม่" title="ดึงข้อมูลใหม่ (R)">↻</button>
  <button type="button" id="fullscreen" aria-label="เต็มจอ" title="เต็มจอ (F)">⛶</button>
</div>
<script>
const CONFIG={
  GAS_URL:'https://script.google.com/macros/s/AKfycbxDSzYCX7LAxVcKi8YECaOEI2-_Jqthlvzh-z_-sBZpo_2QM3Rhp-dvB6iaTYAJfqsJ/exec',
  year:2569,month:'07',storageKey:'stn-executive-briefing-last-good-v1'
};
let activeSlide=1,DATA=null,THRESH={achieved:80,watch:65},LABELS={achieved:'ถึงเป้า',watch:'เฝ้าระวัง',urgent:'ต้องเร่งติดตาม'};
const $=id=>document.getElementById(id);
const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num=value=>Number.isFinite(Number(value))?Number(value):0;
const fmt=value=>Number.isFinite(Number(value))?Number(value).toLocaleString('th-TH',{maximumFractionDigits:1}):'—';
const pct=value=>`${num(value).toFixed(1)}%`;
const statusOf=value=>num(value)>=THRESH.achieved?'achieved':num(value)>=THRESH.watch?'watch':'urgent';
const shortName=name=>String(name||'').replace(/^\s*\d+\s*:\s*/,'').replace(/^โรงพยาบาลส่งเสริมสุขภาพตำบล\s*/,'รพ.สต.');
const facilityName=(data,id)=>shortName((data.facilities||[]).find(f=>String(f.id)===String(id))?.name||id);
const metricIsPercent=metric=>/percent$/i.test(metric.key||'')||/ร้อยละ|เปอร์เซ็นต์|%|Fully/i.test(metric.label||'');
const metricText=metric=>metricIsPercent(metric)?pct(metric.value):fmt(metric.value);
const statusLabel=value=>LABELS[statusOf(value)]||statusOf(value);
const statusClass=value=>statusOf(value)==='achieved'?'':statusOf(value);
const retrievedLabel=()=>new Date().toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'});

function setBadge(state,text){$('badge').className=`live-badge ${state}`;$('badge').innerHTML=`<i></i><span>${esc(text)}</span>`}
function saveLastGood(data){try{localStorage.setItem(CONFIG.storageKey,JSON.stringify(data))}catch(ignore){}}
function readLastGood(){try{return localStorage.getItem(CONFIG.storageKey)}catch(ignore){return null}}
function footer(data){return `<div class="footer-line"><span>ที่มา: Google Sheets · วิเคราะห์เฉพาะข้อมูลระดับภาพรวม/หน่วยบริการ</span><span>${esc(data.meta?.asOfLabel||'')} · สร้างสรุป ${esc(retrievedLabel())}</span></div>`}
function metricCards(program){return (program.metrics||[]).slice(0,4).map(metric=>`<div class="metric"><b>${esc(metricText(metric))}</b><span>${esc(metric.label)}</span></div>`).join('')||'<div class="metric"><span>ยังไม่มีตัวชี้วัดย่อย</span></div>'}
function facilityRows(data,programId){return [...(data.programFacilityDetails?.[programId]||[])].filter(row=>row.facilityId).sort((a,b)=>num(b.progressPercent)-num(a.progressPercent))}
function facilitySpread(rows){return rows.length?num(rows[0].progressPercent)-num(rows[rows.length-1].progressPercent):0}
function programInsight(data,program){
  const rows=facilityRows(data,program.id),urgentRows=rows.filter(r=>statusOf(r.progressPercent)==='urgent');
  const top=rows[0],low=rows[rows.length-1],spread=facilitySpread(rows),gap=Math.max(THRESH.achieved-num(program.progressPercent),0);
  const percentMetrics=(program.metrics||[]).filter(metricIsPercent).sort((a,b)=>num(a.value)-num(b.value));
  let headline='ผลการดำเนินงานอยู่ในระดับถึงเป้า ควรรักษาคุณภาพและติดตามความต่อเนื่อง';
  if(statusOf(program.progressPercent)==='urgent') headline=`ภาพรวมต่ำกว่าเกณฑ์ถึงเป้า ${gap.toFixed(1)} จุด ต้องกำหนดมาตรการเร่งรัดในรอบประชุมนี้`;
  else if(statusOf(program.progressPercent)==='watch') headline=`ภาพรวมอยู่ในช่วงเฝ้าระวัง และยังห่างเกณฑ์ถึงเป้า ${gap.toFixed(1)} จุด`;
  const risks=[];
  if(percentMetrics.length&&num(percentMetrics[0].value)<THRESH.achieved) risks.push(`ตัวชี้วัดต่ำสุด: ${percentMetrics[0].label} ${pct(percentMetrics[0].value)}`);
  if(urgentRows.length) risks.push(`${urgentRows.length} รพ.สต. อยู่ในระดับต้องเร่งติดตาม`);
  if(spread>=20) risks.push(`ช่องว่างระหว่างหน่วยสูงสุด–ต่ำสุด ${spread.toFixed(1)} จุด สะท้อนความเหลื่อมล้ำของผลลัพธ์`);
  if(!risks.length) risks.push('ยังไม่พบสัญญาณต่ำกว่าเกณฑ์หลักจากข้อมูลรอบนี้');
  const actions=[];
  if(low) actions.push(`ทบทวนสาเหตุและแผน 30 วันกับ ${facilityName(data,low.facilityId)} (${pct(low.progressPercent)})`);
  if(percentMetrics.length) actions.push(`กำหนดเจ้าภาพยกระดับ “${percentMetrics[0].label}” พร้อมวันติดตามครั้งถัดไป`);
  else actions.push('กำหนดเจ้าภาพและตัวชี้วัดนำสำหรับติดตามรอบถัดไป');
  return {headline,risks,actions,top,low,spread,urgentRows};
}
function rankMarkup(data,rows){
  if(!rows.length)return '<div class="empty" style="min-height:160px">ยังไม่มีข้อมูลรายหน่วยบริการ</div>';
  const selected=[...rows.slice(0,2),...rows.slice(-3)].filter((row,index,array)=>array.findIndex(x=>x.facilityId===row.facilityId)===index);
  return `<div class="facility-rank">${selected.map((row,index)=>{
    const isLow=rows.indexOf(row)>=Math.max(rows.length-3,0);const rank=rows.indexOf(row)+1;
    return `<div class="facility-line ${isLow?'low':''}"><span class="rank">#${rank}</span><b title="${esc(facilityName(data,row.facilityId))}">${esc(facilityName(data,row.facilityId))}</b><span class="value">${pct(row.progressPercent)}</span></div>`
  }).join('')}</div>`
}
function coverSlide(data){return `<section class="slide cover"><div class="sheet"><div class="cover-inner">
  <div class="eyebrow">LIVE EXECUTIVE BRIEFING · สธน.มายอ</div>
  <h1>สถานการณ์ 7 งานวันนี้<br><em>ประเด็นไหนต้องตัดสินใจ</em></h1>
  <p class="subtitle">สรุปเพื่อการประชุมจากข้อมูล Google Sheets ณ เวลาที่เปิด พร้อม insight รายงาน หน่วยบริการที่ควรสนับสนุน และข้อเสนอสำหรับมติที่ประชุม</p>
  <div class="cover-meta"><span class="cover-chip">7 งานหลัก</span><span class="cover-chip">${(data.facilities||[]).length} รพ.สต.</span><span class="cover-chip">${esc(data.meta?.asOfLabel||'รอบข้อมูลล่าสุด')}</span><span class="cover-chip">สร้าง ${esc(retrievedLabel())}</span></div>
</div></div></section>`}
function pulseSlide(data,programs){
  const avg=programs.length?programs.reduce((s,p)=>s+num(p.progressPercent),0)/programs.length:0;
  const urgent=programs.filter(p=>statusOf(p.progressPercent)==='urgent');const watch=programs.filter(p=>statusOf(p.progressPercent)==='watch');
  const worst=[...programs].sort((a,b)=>num(a.progressPercent)-num(b.progressPercent))[0];
  const lead=urgent.length?`มี <strong>${urgent.length} งานต้องเร่งติดตาม</strong> โดย ${esc(worst?.name||'งานลำดับแรก')} มีความก้าวหน้าต่ำสุด ${pct(worst?.progressPercent)}`:`ไม่มีงานต่ำกว่าเกณฑ์เร่งด่วน และมี ${watch.length} งานที่ยังต้องเฝ้าระวัง`;
  return `<section class="slide"><div class="sheet"><header class="head"><div class="head-main"><div class="eyebrow">01 · EXECUTIVE PULSE</div><h2>สถานการณ์ที่ผู้บริหารควรรู้ใน 60 วินาที</h2><p class="subtitle">คำนวณใหม่ทุกครั้งที่เปิดสไลด์จากข้อมูลรอบปัจจุบัน</p></div></header><div class="body">
    <div class="grid c4"><div class="kpi"><b>${pct(avg)}</b><span>ความก้าวหน้าเฉลี่ย 7 งาน</span></div><div class="kpi good"><b>${programs.filter(p=>statusOf(p.progressPercent)==='achieved').length}</b><span>งานถึงเป้า</span></div><div class="kpi"><b>${watch.length}</b><span>งานเฝ้าระวัง</span></div><div class="kpi bad"><b>${urgent.length}</b><span>งานต้องเร่งติดตาม</span></div></div>
    <div class="brief"><div class="panel"><h3>ข้อค้นพบหลัก <span class="tag">AUTO INSIGHT</span></h3><p class="lead-insight">${lead}</p><div class="signal-list">${urgent.slice(0,3).map(p=>`<div class="signal risk"><i>●</i><span>${esc(p.name)} ${pct(p.progressPercent)} — ต่ำกว่าเกณฑ์ถึงเป้า ${(THRESH.achieved-num(p.progressPercent)).toFixed(1)} จุด</span></div>`).join('')||'<div class="signal"><i>✓</i><span>ไม่มีงานอยู่ในระดับต้องเร่งติดตาม</span></div>'}</div></div>
    <div class="panel"><h3>ข้อเสนอเปิดการประชุม</h3><div class="signal-list"><div class="signal action"><i>01</i><span>รับทราบภาพรวมและยืนยันงานเร่งด่วน</span></div><div class="signal action"><i>02</i><span>เจาะทีละงาน พร้อมหน่วยบริการที่ต้องสนับสนุน</span></div><div class="signal action"><i>03</i><span>ปิดท้ายด้วยมติ เจ้าภาพ และวันติดตาม</span></div></div></div></div>${footer(data)}
  </div></div></section>`
}
function prioritiesSlide(data,programs){const sorted=[...programs].sort((a,b)=>num(a.progressPercent)-num(b.progressPercent));return `<section class="slide"><div class="sheet"><header class="head"><div class="head-main"><div class="eyebrow">02 · PRIORITY MAP</div><h2>เริ่มจากงานที่ต้องช่วยก่อน</h2><p class="subtitle">เรียงจากความก้าวหน้าต่ำไปสูง เพื่อใช้เวลาประชุมกับประเด็นสำคัญที่สุด</p></div></header><div class="body"><div class="program-list">${sorted.map(p=>`<div class="program-row"><div class="program-name">${esc(p.icon||'')} ${esc(p.name)}</div><div class="bar"><span class="${statusClass(p.progressPercent)}" style="width:${Math.min(num(p.progressPercent),100)}%"></span></div><div class="pct">${pct(p.progressPercent)}</div><div class="row-status ${statusClass(p.progressPercent)}">${esc(statusLabel(p.progressPercent))}</div></div>`).join('')}</div>${footer(data)}</div></div></section>`}
function programSlide(data,program,index){
  const rows=facilityRows(data,program.id),insight=programInsight(data,program);
  return `<section class="slide"><div class="sheet"><header class="head"><div class="head-main"><div class="eyebrow">${String(index+3).padStart(2,'0')} · PROGRAM BRIEF</div><h2>${esc(program.icon||'')} ${esc(program.name)}</h2><p class="subtitle">ตัวเลขสำคัญ · ความแตกต่างรายหน่วย · ประเด็นที่ควรตัดสินใจ</p></div><div class="status-block"><div class="score">${pct(program.progressPercent)}</div><div class="status-pill ${statusClass(program.progressPercent)}">${esc(statusLabel(program.progressPercent))}</div></div></header><div class="body"><div class="program-layout">
    <div style="display:flex;flex-direction:column;gap:12px"><div class="panel"><h3>ตัวเลขสำคัญ</h3><div class="metric-grid">${metricCards(program)}</div></div><div class="panel"><h3>อันดับรายหน่วยบริการ <span class="tag">บน 2 · ล่าง 3</span></h3>${rankMarkup(data,rows)}</div></div>
    <div class="insight-box"><div class="ai-label">RULE-BASED SMART INSIGHT · ไม่ส่งข้อมูลออกภายนอก</div><h3>${esc(insight.headline)}</h3><div class="signal-list">${insight.risks.map(r=>`<div class="signal risk"><i>!</i><span>${esc(r)}</span></div>`).join('')}${insight.actions.map(a=>`<div class="signal action"><i>→</i><span>${esc(a)}</span></div>`).join('')}</div><p class="insight-note">Insight สร้างจากเกณฑ์สถานะ ความต่างระหว่างหน่วย และตัวชี้วัดต่ำสุด ควรใช้ร่วมกับบริบทจากเจ้าของงานก่อนมีมติ</p></div>
  </div>${footer(data)}</div></div></section>`
}
function facilitySupport(data,programs){
  const bucket={};programs.forEach(program=>facilityRows(data,program.id).forEach(row=>{const id=String(row.facilityId);bucket[id]??={id,values:[],urgent:[],watch:[]};bucket[id].values.push(num(row.progressPercent));const st=statusOf(row.progressPercent);if(st==='urgent')bucket[id].urgent.push(program.name);if(st==='watch')bucket[id].watch.push(program.name)}));
  const rows=Object.values(bucket).map(row=>({...row,avg:row.values.length?row.values.reduce((a,b)=>a+b,0)/row.values.length:0})).sort((a,b)=>b.urgent.length-a.urgent.length||a.avg-b.avg);
  return `<section class="slide"><div class="sheet"><header class="head"><div class="head-main"><div class="eyebrow">10 · CROSS-PROGRAM VIEW</div><h2>หน่วยบริการที่ควรได้รับการสนับสนุนก่อน</h2><p class="subtitle">มองข้ามเส้นแบ่งรายงาน เพื่อหา รพ.สต. ที่มีหลายงานต่ำกว่าเกณฑ์พร้อมกัน</p></div></header><div class="body"><div class="panel"><table class="support-table"><thead><tr><th>ลำดับ</th><th>หน่วยบริการ</th><th>ค่าเฉลี่ยงานที่มีข้อมูล</th><th>งานต้องเร่ง</th><th>ประเด็นหลัก</th></tr></thead><tbody>${rows.slice(0,7).map((row,i)=>`<tr><td class="mono">${i+1}</td><td><b>${esc(facilityName(data,row.id))}</b></td><td class="mono">${pct(row.avg)}</td><td class="mono danger">${row.urgent.length}</td><td>${esc(row.urgent.slice(0,3).map(x=>x.replace(/^งาน/,'')).join(' · ')||'เฝ้าระวัง '+row.watch.length+' งาน')}</td></tr>`).join('')}</tbody></table></div><div class="signal action"><i>→</i><span>ข้อเสนอ: เลือก 3 หน่วยแรกทำแผนสนับสนุนแบบบูรณาการ แทนการติดตามแยกทีละงาน</span></div>${footer(data)}</div></div></section>`
}
function decisionsSlide(data,programs){
  const sorted=[...programs].sort((a,b)=>num(a.progressPercent)-num(b.progressPercent)),worst=sorted[0],second=sorted[1];
  const all=[];programs.forEach(p=>facilityRows(data,p.id).forEach(r=>all.push({program:p,row:r})));
  const facilityCounts={};all.filter(x=>statusOf(x.row.progressPercent)==='urgent').forEach(x=>facilityCounts[x.row.facilityId]=(facilityCounts[x.row.facilityId]||0)+1);
  const priorityFacility=Object.entries(facilityCounts).sort((a,b)=>b[1]-a[1])[0];
  return `<section class="slide"><div class="sheet"><header class="head"><div class="head-main"><div class="eyebrow">11 · MEETING DECISIONS</div><h2>จบการประชุมด้วยมติที่ชัดเจน</h2><p class="subtitle">ตัวเลขจะมีคุณค่าเมื่อแปลงเป็นเจ้าภาพ การลงมือทำ และวันติดตามครั้งถัดไป</p></div></header><div class="body"><div class="decision-grid">
    <div class="decision"><div class="no">DECISION 01</div><h3>ยืนยัน 2 งานเร่งด่วน</h3><p>${esc(worst?.name||'—')} ${pct(worst?.progressPercent)} และ ${esc(second?.name||'—')} ${pct(second?.progressPercent)} เป็นวาระติดตาม 30 วัน</p><div class="owner">เจ้าภาพ: ผู้รับผิดชอบงาน · กำหนดส่งแผน: ______</div></div>
    <div class="decision"><div class="no">DECISION 02</div><h3>สนับสนุนหน่วยที่มีหลายปัญหา</h3><p>${priorityFacility?`${esc(facilityName(data,priorityFacility[0]))} มี ${priorityFacility[1]} งานต่ำกว่าเกณฑ์เร่งด่วน`:'รอยืนยันจากข้อมูลรายหน่วย'} ให้จัดทีมสนับสนุนแบบบูรณาการ</p><div class="owner">เจ้าภาพ: ทีมสนับสนุนพื้นที่ · ลงพื้นที่: ______</div></div>
    <div class="decision"><div class="no">DECISION 03</div><h3>ยืนยันรอบข้อมูลครั้งถัดไป</h3><p>เจ้าของงานตรวจความครบถ้วนของ Google Sheets ก่อนประชุม และใช้สไลด์ชุดนี้เป็นเอกสารสถานการณ์กลาง</p><div class="owner">วันประชุมติดตาม: ______ · ผู้บันทึกมติ: ______</div></div>
  </div><div class="signal"><i>ℹ</i><span>โหมดนี้สร้าง insight อัตโนมัติจากข้อมูลรวม ไม่มีข้อมูลผู้ป่วยรายบุคคล และยังไม่ส่งข้อมูลไปยังบริการ AI ภายนอก</span></div>${footer(data)}</div></div></section>`
}
function renderDeck(data){
  DATA=data;THRESH=data.meta?.statusThresholds||THRESH;LABELS=data.meta?.statusLabels||LABELS;
  const programs=data.programs||[];
  const html=[coverSlide(data),pulseSlide(data,programs),prioritiesSlide(data,programs),...programs.map((p,i)=>programSlide(data,p,i)),facilitySupport(data,programs),decisionsSlide(data,programs)].join('');
  $('slides').innerHTML=html;$('total').textContent=document.querySelectorAll('.slide').length;showSlide(Math.min(activeSlide,document.querySelectorAll('.slide').length));
}
function showSlide(n){const slides=[...document.querySelectorAll('.slide')];if(!slides.length)return;activeSlide=Math.max(1,Math.min(n,slides.length));slides.forEach((slide,i)=>slide.classList.toggle('active',i===activeSlide-1));$('current').textContent=activeSlide;$('total').textContent=slides.length;$('progress').style.width=`${activeSlide/slides.length*100}%`}
function validate(data){if(!data||data.error||!data.meta||!Array.isArray(data.programs)||!Array.isArray(data.facilities)||!data.programFacilityDetails)throw new Error(data?.error||'รูปแบบข้อมูลไม่ครบสำหรับ Executive Briefing');return data}
async function loadLive(){setBadge('','กำลังอ่านข้อมูลล่าสุด…');const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),18000);const url=new URL(CONFIG.GAS_URL);url.searchParams.set('action','all');url.searchParams.set('year',CONFIG.year);url.searchParams.set('month',CONFIG.month);url.searchParams.set('_',Date.now());
  try{const response=await fetch(url,{cache:'no-store',redirect:'follow',signal:controller.signal});if(!response.ok)throw new Error(`HTTP ${response.status}`);const data=validate(await response.json());saveLastGood(data);renderDeck(data);setBadge('live','ข้อมูลสด · สรุปใหม่แล้ว')}
  catch(error){const cached=readLastGood();if(cached){renderDeck(validate(JSON.parse(cached)));setBadge('cached','ใช้ข้อมูลล่าสุดที่เคยโหลดได้')}else{$('slides').innerHTML=`<section class="slide active"><div class="sheet"><div class="empty"><div><h2>ยังสร้างสไลด์ไม่ได้</h2><p class="subtitle">เชื่อมต่อแหล่งข้อมูลไม่สำเร็จ กรุณากด ↻ เพื่อลองใหม่</p></div></div></div></section>`;setBadge('error','เชื่อมต่อข้อมูลไม่สำเร็จ')}}finally{clearTimeout(timeout)}}
$('prev').addEventListener('click',()=>showSlide(activeSlide-1));$('next').addEventListener('click',()=>showSlide(activeSlide+1));$('refresh').addEventListener('click',loadLive);$('fullscreen').addEventListener('click',()=>{if(document.fullscreenElement)document.exitFullscreen?.();else document.documentElement.requestFullscreen?.()});
document.addEventListener('keydown',event=>{if(['ArrowRight','PageDown',' '].includes(event.key)){event.preventDefault();showSlide(activeSlide+1)}else if(['ArrowLeft','PageUp'].includes(event.key)){event.preventDefault();showSlide(activeSlide-1)}else if(event.key==='Home')showSlide(1);else if(event.key==='End')showSlide(document.querySelectorAll('.slide').length);else if(event.key.toLowerCase()==='f')$('fullscreen').click();else if(event.key.toLowerCase()==='r')loadLive()});
loadLive();
</script>
</body>
</html>
